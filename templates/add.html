<!DOCTYPE html>
<html>
<head>
<title>Add Patient</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2 class="text-center">Add Patient</h2>

<form method="post" class="mt-4">

<input name="name" class="form-control mb-3" placeholder="Patient Name">
<input name="age" class="form-control mb-3" placeholder="Age">
<input name="disease" class="form-control mb-3" placeholder="Disease">

<button class="btn btn-success w-100">Add Patient</button>

</form>

<div class="text-center mt-3">
<a href="/dashboard" class="btn btn-secondary">Back</a>
</div>

</div>

</body>
</html>
